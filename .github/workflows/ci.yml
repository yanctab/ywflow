name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get install -y musl-tools
      - run: make fmt-check
      - run: make lint
      - run: make test
      - run: make build
