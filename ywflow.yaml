context:
  planning_model: Opus
  breakdown_model: Sonnet
  execute_model: Haiku
  review_model: Opus
  freestyle_model: Sonnet
  project_dir: ${cwd}
  plugin: ywflow

cli:
  command: claude

plugins:
  - name: local-skills
    source: local
    path: .claude/skills

workflow:
  session:
    description: "A deep dive interactive planning session producing a PRD"
    args:
      - name: description
        accepts:
          - string
        required: true
        help: "A short description to get the interactive planning session going"
    cli:
      args:
        - --model
        - ${planning_model}
        - --worktree
        - plan-session
        - "/${plugin}:planning-session ${description}"

  plan:
    description: "Create a prd or verify an exiting one"
    args:
      - name: input
        accepts:
          - string
          - file
        required: true
        help: "A description or a PRD file"
    cli:
      args:
        - --model
        - ${planning_model}
        - --worktree
        - plan-session
        - "/${plugin}:new-prd ${input}"

  breakdown:
    description: "Break down the PRD into implementation slices"
    args:
      - name: input
        accepts:
          - url
        required: true
        help: "URL to PRD to break down into tasks"
    cli:
      args:
        - --model
        - ${breakdown_model}
        - --worktree
        - breakdown-session
        - "/${plugin}:prd-to-issues ${input}"

  execute:
    description: "Execute a single implementation slice"
    args:
      - name: issue
        accepts:
          - url
        required: true
        help: "GitHub issue URL for the slice to implement"
    cli:
      args:
        - --model
        - ${execute_model}
        - --worktree
        - execute-session
        - "/${plugin}:execute ${issue}"

  review:
    description: "Review a PR"
    args:
      - name: pr
        accepts:
          - url
        required: true
        help: "GitHub PR to review"
    cli:
      args:
        - --model
        - ${review_model}
        - --worktree
        - review-session
        - "/review ${pr}"

  freestyle:
    description: "A freestyle session write whatever you want"
    args:
      - name: input
        accepts:
          - string
        required: true
        help: "A freestyle string for the session"
    cli:
      args:
        - --model
        - ${freestyle_model}
        - --worktree
        - freestyle-session
        - "${input}"
